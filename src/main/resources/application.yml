# 공통 설정
spring:
  application:
    name: IoT_web_backend
  profiles:
    active: dev
  datasource:
    # 개인 .env 설정
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.batch_size: 500
        order_inserts: true
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax
        secure: ${SESSION_COOKIE_SECURE:false}
      timeout: ${SESSION_TIMEOUT:30m}
  forward-headers-strategy: framework

weather:
  fetch:
    enabled: true
    max-back-hours: 3
    cooldown-minutes: 60

kma:
  url: https://apihub.kma.go.kr/api/typ01/url/kma_sfctm2.php
  authKey: ${KMA_AUTH_KEY:}
  stn: 108
  warning:
    now.url: https://apihub.kma.go.kr/api/typ01/url/wrn_now_data.php
    fe: f
    reg.url: https://apihub.kma.go.kr/api/typ01/url/wrn_reg.php
    type: WD
    reg: 108
    authKey: ${KMA_WARNING_AUTH_KEY:${KMA_AUTH_KEY:}}
  help: 1
  http:
    connect-timeout: 3s
    read-timeout: 10s

---
# 로컬 환경 ( DBMS / MQTT / LLM )
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mariadb://localhost:3307/iot_db?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&rewriteBatchedStatements=true
  jpa:
    show-sql: true

llm:
  server:
    url: http://127.0.0.1:8000
MQTT_BROKER_URL: tcp://210.104.76.141:1883

---
# 클라우드 서버 환경
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mariadb://mariadb:3306/iot_db?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&rewriteBatchedStatements=true
  jpa:
    show-sql: false

llm:
  server:
    url: http://llm-server:8000
MQTT_BROKER_URL: tcp://mosquitto:1883